name: Build luci-app-onliner IPK

on:
  push:
    tags:
      - 'v*'          # 推 tag 时触发，如 git tag v5.0-r1 && git push --tags
  workflow_dispatch:  # 也可以在 Actions 页面手动触发

# ── 版本号从 tag 提取，手动触发时用 dev ──────────────────────
env:
  PKG_NAME: luci-app-onliner
  PKG_VERSION: "5.0"

jobs:
  build:
    name: "${{ matrix.arch }} (${{ matrix.libc }})"
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false   # 一个架构失败不影响其他
      matrix:
        include:
          # ── MIPS (大端，OpenWrt 最常见的软路由/家用路由架构) ──
          - arch: mips
            libc: musl
            triple: mips-linux-musl
            openwrt_arch: mips_24kc
            cflags: "-march=mips32r2 -mabi=32 -msoft-float"

          # ── MIPSEL (小端，MT7620/MT7621 等) ──────────────────
          - arch: mipsel
            libc: musl
            triple: mipsel-linux-musl
            openwrt_arch: mipsel_24kc
            cflags: "-march=mips32r2 -mabi=32 -msoft-float"

          # ── ARM (armv7，斐讯/树莓派等) ───────────────────────
          - arch: arm
            libc: musl
            triple: arm-linux-musleabihf
            openwrt_arch: arm_cortex-a7_neon-vfpv4
            cflags: "-march=armv7-a -mfpu=vfpv3 -mfloat-abi=hard"

          # ── AArch64 (ARM64，R2S/R4S/NanoPi 等) ──────────────
          - arch: aarch64
            libc: musl
            triple: aarch64-linux-musl
            openwrt_arch: aarch64_cortex-a53
            cflags: "-march=armv8-a"

          # ── x86_64 (软路由 PC，虚拟机) ───────────────────────
          - arch: x86_64
            libc: musl
            triple: x86_64-linux-musl
            openwrt_arch: x86_64
            cflags: "-march=x86-64"

          # ── RISC-V 64 (部分新款路由器) ───────────────────────
          - arch: riscv64
            libc: musl
            triple: riscv64-linux-musl
            openwrt_arch: riscv64_riscv64
            cflags: "-march=rv64gc -mabi=lp64d"

    steps:
      # ── 1. 检出代码 ────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 解析版本号 ──────────────────────────────────────
      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            # tag 格式期望 v5.0-r1，拆成 PKG_VERSION 和 PKG_RELEASE
            PKG_VERSION="${TAG%%-*}"
            PKG_RELEASE="${TAG##*-}"
            [ "$PKG_RELEASE" = "$TAG" ] && PKG_RELEASE="r1"
          else
            PKG_VERSION="${{ env.PKG_VERSION }}"
            PKG_RELEASE="dev"
          fi
          echo "PKG_VERSION=$PKG_VERSION" >> $GITHUB_OUTPUT
          echo "PKG_RELEASE=$PKG_RELEASE" >> $GITHUB_OUTPUT
          echo "PKG_FULLVER=${PKG_VERSION}-${PKG_RELEASE}" >> $GITHUB_OUTPUT

      # ── 3. 安装 musl-cross 工具链 ─────────────────────────
      #    使用 musl.cc 预编译工具链，下载比安装 SDK 快 100 倍
      - name: Install musl cross-compiler
        run: |
          TRIPLE="${{ matrix.triple }}"
          TOOLCHAIN_URL="https://musl.cc/${TRIPLE}-cross.tgz"

          echo "Downloading toolchain for ${TRIPLE}..."
          curl -fsSL --retry 3 "$TOOLCHAIN_URL" | tar xz -C /opt
          echo "/opt/${TRIPLE}-cross/bin" >> $GITHUB_PATH

      # ── 4. 编译 onliner 二进制 ────────────────────────────
      - name: Compile onliner
        run: |
          TRIPLE="${{ matrix.triple }}"
          CC="${TRIPLE}-gcc"

          ${CC} -O2 -Wall -Wextra -Werror \
                ${{ matrix.cflags }} \
                -static \
                -o onliner \
                src/onliner.c

          # strip 缩小体积
          ${TRIPLE}-strip onliner

          echo "=== Binary info ==="
          file onliner
          ls -lh onliner

      # ── 5. 手动打包 .ipk ──────────────────────────────────
      #    ipk = gzip(tar(debian-binary, control.tar.gz, data.tar.gz))
      - name: Package IPK
        run: |
          set -e
          TRIPLE="${{ matrix.triple }}"
          OPENWRT_ARCH="${{ matrix.openwrt_arch }}"
          PKG_VERSION="${{ steps.version.outputs.PKG_VERSION }}"
          PKG_RELEASE="${{ steps.version.outputs.PKG_RELEASE }}"
          PKG_FULLVER="${{ steps.version.outputs.PKG_FULLVER }}"
          IPK_NAME="${{ env.PKG_NAME }}_${PKG_FULLVER}_${OPENWRT_ARCH}.ipk"

          WORK="$(pwd)/_ipk_work"
          mkdir -p "$WORK/data" "$WORK/control_dir"

          # ── data/ 树 ──────────────────────────────────────
          # 二进制
          install -Dm755 onliner \
              "$WORK/data/usr/sbin/onliner"

          # init.d
          install -Dm755 files/etc/init.d/onliner \
              "$WORK/data/etc/init.d/onliner"

          # uci-defaults（安装后自动 enable+start）
          install -Dm755 files/etc/uci-defaults/luci-app-onliner \
              "$WORK/data/etc/uci-defaults/luci-app-onliner"

          # 默认空设备列表
          install -Dm644 files/etc/onliner/devices.json \
              "$WORK/data/etc/onliner/devices.json"

          # LuCI 菜单
          install -Dm644 files/usr/share/luci/menu.d/luci-app-onliner.json \
              "$WORK/data/usr/share/luci/menu.d/luci-app-onliner.json"

          # rpcd ACL
          install -Dm644 files/usr/share/rpcd/acl.d/luci-app-onliner.json \
              "$WORK/data/usr/share/rpcd/acl.d/luci-app-onliner.json"

          # ucode RPC 后端
          install -Dm644 files/usr/share/rpcd/ucode/luci.onliner \
              "$WORK/data/usr/share/rpcd/ucode/luci.onliner"

          # 前端 JS
          install -Dm644 files/www/luci-static/resources/view/onliner/main.js \
              "$WORK/data/www/luci-static/resources/view/onliner/main.js"

          # 计算安装大小（KB）
          INSTALLED_SIZE=$(du -sk "$WORK/data" | cut -f1)

          # ── control ───────────────────────────────────────
          cat > "$WORK/control_dir/control" <<EOF
          Package: ${{ env.PKG_NAME }}
          Version: ${PKG_FULLVER}
          Depends: libc
          License: GPL-2.0-only
          Section: luci
          Architecture: ${OPENWRT_ARCH}
          Installed-Size: ${INSTALLED_SIZE}
          Description: LuCI online device tracker (C binary, no jq dependency)
          EOF
          # 去除 heredoc 缩进
          sed -i 's/^          //' "$WORK/control_dir/control"

          # postinst（标准模板）
          cat > "$WORK/control_dir/postinst" <<'POSTINST'
          #!/bin/sh
          [ "${IPKG_NO_SCRIPT}" = "1" ] && exit 0
          [ -s ${IPKG_INSTROOT}/lib/functions.sh ] || exit 0
          . ${IPKG_INSTROOT}/lib/functions.sh
          default_postinst $0 $@
          exit 0
          POSTINST
          sed -i 's/^          //' "$WORK/control_dir/postinst"
          chmod 755 "$WORK/control_dir/postinst"

          # ── 打包 ──────────────────────────────────────────
          # control.tar.gz（注意：路径不含 data/ 前缀）
          tar -czf "$WORK/control.tar.gz" \
              -C "$WORK/control_dir" \
              ./control ./postinst

          # data.tar.gz
          tar -czf "$WORK/data.tar.gz" \
              -C "$WORK/data" \
              .

          # debian-binary
          echo "2.0" > "$WORK/debian-binary"

          # 最终打包为 ipk（本质是 gzip 的 tar）
          tar -czf "${IPK_NAME}" \
              -C "$WORK" \
              ./debian-binary \
              ./control.tar.gz \
              ./data.tar.gz

          echo "IPK_NAME=${IPK_NAME}" >> $GITHUB_ENV
          echo "=== IPK info ==="
          ls -lh "${IPK_NAME}"

      # ── 6. 上传 artifact（每个 job 单独上传） ─────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.PKG_NAME }}-${{ matrix.openwrt_arch }}"
          path: "*.ipk"
          retention-days: 30

  # ── Release job：汇总所有 ipk 发布 ───────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    # 只在 tag 推送时创建 release
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ipks
          merge-multiple: true   # 把所有 artifact 拍平到 ipks/

      - name: List artifacts
        run: ls -lh ipks/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.PKG_NAME }} ${{ github.ref_name }}"
          body: |
            ## luci-app-onliner ${{ github.ref_name }}

            C binary 版本，无需 jq 依赖，直接读 `/proc/net/arp`。

            ### 支持架构
            | 架构 | 适用设备 |
            |------|---------|
            | `mips_24kc` | MT7621、AR9331 等传统路由器 |
            | `mipsel_24kc` | MT7620、MT7628 等 |
            | `arm_cortex-a7` | 斐训 N1、树莓派 2/3 等 |
            | `aarch64_cortex-a53` | R2S、R4S、NanoPi 等 |
            | `x86_64` | 软路由 PC、虚拟机 |
            | `riscv64` | 部分新款路由器 |

            ### 安装方法
            ```sh
            # 下载对应架构的 ipk，然后：
            opkg install luci-app-onliner_*_<your_arch>.ipk
            ```

            ### 变更日志
            - C binary 重写，替代 Shell + jq 方案
            - 零外部依赖（仅 libc）
            - 静态链接，可直接运行无需安装额外库
          files: ipks/*.ipk
          draft: false
          prerelease: false
