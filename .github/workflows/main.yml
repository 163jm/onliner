name: Build luci-app-onliner IPK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PKG_NAME: luci-app-onliner
  ZIG_VERSION: "0.13.0"

jobs:
  build:
    name: "${{ matrix.openwrt_arch }}"
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - zig_target: mips-linux-musl
            openwrt_arch: mips_24kc
            zig_cpu: mips32r2

          - zig_target: mipsel-linux-musl
            openwrt_arch: mipsel_24kc
            zig_cpu: mips32r2

          - zig_target: arm-linux-musleabihf
            openwrt_arch: arm_cortex-a7_neon-vfpv4
            zig_cpu: cortex_a7

          - zig_target: aarch64-linux-musl
            openwrt_arch: aarch64_cortex-a53
            zig_cpu: cortex_a53

          - zig_target: x86_64-linux-musl
            openwrt_arch: x86_64
            zig_cpu: x86_64

          - zig_target: riscv64-linux-musl
            openwrt_arch: riscv64_riscv64
            zig_cpu: generic_rv64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            PKG_VERSION="${TAG%%-*}"
            PKG_RELEASE="${TAG##*-}"
            [ "$PKG_RELEASE" = "$TAG" ] && PKG_RELEASE="r1"
          else
            PKG_VERSION="5.0"
            PKG_RELEASE="dev"
          fi
          echo "ver=${PKG_VERSION}-${PKG_RELEASE}" >> $GITHUB_OUTPUT

      - name: Setup Zig ${{ env.ZIG_VERSION }}
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Compile
        run: |
          zig cc src/onliner.c \
            -target ${{ matrix.zig_target }} \
            -mcpu=${{ matrix.zig_cpu }} \
            -O2 \
            -static \
            -o onliner \
            -Wall -Wextra -Werror

          echo "=== binary info ==="
          file onliner
          ls -lh onliner

      - name: Package IPK
        id: pkg
        run: |
          set -e
          VER="${{ steps.ver.outputs.ver }}"
          ARCH="${{ matrix.openwrt_arch }}"
          IPK="${{ env.PKG_NAME }}_${VER}_${ARCH}.ipk"

          W="$(pwd)/_work"
          mkdir -p "$W/data" "$W/ctl"

          install -Dm755 onliner                                                "$W/data/usr/sbin/onliner"
          install -Dm755 files/etc/init.d/onliner                               "$W/data/etc/init.d/onliner"
          install -Dm755 files/etc/uci-defaults/luci-app-onliner                "$W/data/etc/uci-defaults/luci-app-onliner"
          install -Dm644 files/etc/onliner/devices.json                         "$W/data/etc/onliner/devices.json"
          install -Dm644 files/usr/share/luci/menu.d/luci-app-onliner.json     "$W/data/usr/share/luci/menu.d/luci-app-onliner.json"
          install -Dm644 files/usr/share/rpcd/acl.d/luci-app-onliner.json      "$W/data/usr/share/rpcd/acl.d/luci-app-onliner.json"
          install -Dm644 files/usr/share/rpcd/ucode/luci.onliner               "$W/data/usr/share/rpcd/ucode/luci.onliner"
          install -Dm644 files/www/luci-static/resources/view/onliner/main.js  "$W/data/www/luci-static/resources/view/onliner/main.js"

          SIZE=$(du -sk "$W/data" | cut -f1)

          cat > "$W/ctl/control" << EOF
          Package: ${{ env.PKG_NAME }}
          Version: ${VER}
          Depends: libc
          License: GPL-2.0-only
          Section: luci
          Architecture: ${ARCH}
          Installed-Size: ${SIZE}
          Description: LuCI online device tracker (C binary, no jq required)
          EOF
          sed -i 's/^          //' "$W/ctl/control"

          cat > "$W/ctl/postinst" << 'EOF'
          #!/bin/sh
          [ "${IPKG_NO_SCRIPT}" = "1" ] && exit 0
          [ -s ${IPKG_INSTROOT}/lib/functions.sh ] || exit 0
          . ${IPKG_INSTROOT}/lib/functions.sh
          default_postinst $0 $@
          exit 0
          EOF
          sed -i 's/^          //' "$W/ctl/postinst"
          chmod 755 "$W/ctl/postinst"

          echo "2.0" > "$W/debian-binary"
          tar -czf "$W/control.tar.gz" -C "$W/ctl"  ./control ./postinst
          tar -czf "$W/data.tar.gz"    -C "$W/data" .
          tar -czf "$IPK"              -C "$W"       ./debian-binary ./control.tar.gz ./data.tar.gz

          ls -lh "$IPK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.PKG_NAME }}-${{ matrix.openwrt_arch }}"
          path: "*.ipk"
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all IPKs
        uses: actions/download-artifact@v4
        with:
          path: ipks
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.PKG_NAME }} ${{ github.ref_name }}"
          body: |
            ## luci-app-onliner ${{ github.ref_name }}

            C binary 版本，无需 `jq`，直接读 `/proc/net/arp`。

            | 架构 | 适用设备 |
            |------|---------|
            | `mips_24kc` | MT7621、AR9331 等传统路由器 |
            | `mipsel_24kc` | MT7620、MT7628 等 |
            | `arm_cortex-a7_neon-vfpv4` | 斐讯 N1、树莓派等 |
            | `aarch64_cortex-a53` | R2S、R4S、NanoPi 等 |
            | `x86_64` | 软路由 PC、虚拟机 |
            | `riscv64_riscv64` | 新款 RISC-V 路由器 |

            ```sh
            opkg install luci-app-onliner_*_<arch>.ipk
            ```
          files: ipks/*.ipk
